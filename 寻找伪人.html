<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜间值班审查</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            color: #b0b0b0;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 12px 0;
            border-bottom: 1px solid #2a2a35;
        }

        .header h1 {
            font-size: 20px;
            color: #888;
            font-weight: normal;
            letter-spacing: 2px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 12px;
            padding-bottom: 8px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: #555;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
        }

        .chaos-value { color: #c44; }
        .moral-value { color: #b85; }
        .progress-value { color: #6a6; }

        .bar-container {
            width: 60px;
            height: 4px;
            background: #1a1a20;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
            margin-left: auto;
            margin-right: auto;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.5s;
        }

        .chaos-fill { background: #c44; }
        .moral-fill { background: #b85; }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px 0;
        }

        .person-info {
            background: #12121a;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #1f1f28;
        }

        .person-name {
            font-size: 16px;
            color: #7a9ec2;
            margin-bottom: 6px;
        }

        .person-desc {
            font-size: 13px;
            color: #555;
        }

        .chat-box {
            flex: 1;
            background: #0d0d12;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            max-height: 280px;
            border: 1px solid #1a1a22;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 6px;
            line-height: 1.7;
            font-size: 14px;
        }

        .message.question {
            background: #1a1a25;
            color: #8ab;
            margin-left: 20px;
        }

        .message.answer {
            background: #151520;
            color: #999;
            margin-right: 20px;
        }

        .message.system {
            background: transparent;
            text-align: center;
            color: #555;
            font-size: 12px;
            padding: 5px;
        }

        .message.system.correct { color: #6a6; }
        .message.system.wrong-chaos { color: #c44; }
        .message.system.wrong-moral { color: #b85; }

        .question-panel {
            margin-top: 12px;
            background: #0f0f15;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #1a1a22;
        }

        .question-header {
            font-size: 12px;
            color: #555;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .questions {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .question-btn {
            background: #1a1a24;
            border: 1px solid #252530;
            color: #888;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 13px;
            transition: all 0.2s;
        }

        .question-btn:hover:not(:disabled) {
            background: #1f1f2a;
            border-color: #3a3a4a;
            color: #aaa;
        }

        .question-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .controls {
            padding: 15px 0 10px;
            border-top: 1px solid #1f1f28;
            margin-top: auto;
        }

        .prompt-text {
            text-align: center;
            font-size: 13px;
            margin-bottom: 12px;
            color: #666;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            padding: 12px 40px;
            font-size: 14px;
            border: 1px solid;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
        }

        .btn-reject {
            color: #a55;
            border-color: #422;
        }

        .btn-reject:hover {
            background: #2a1515;
            border-color: #633;
        }

        .btn-pass {
            color: #6a6;
            border-color: #243;
        }

        .btn-pass:hover {
            background: #152515;
            border-color: #354;
        }

        /* 结束画面 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.show {
            display: flex;
        }

        .result-box {
            text-align: center;
            padding: 40px;
            background: #0d0d12;
            border-radius: 10px;
            border: 1px solid #1f1f28;
            max-width: 380px;
        }

        .result-box h2 {
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: normal;
        }

        .result-box.victory h2 { color: #6a6; }
        .result-box.defeat h2 { color: #a55; }

        .result-box p {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.8;
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid #1a1a22;
            border-bottom: 1px solid #1a1a22;
        }

        .result-stat {
            text-align: center;
        }

        .result-stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #888;
        }

        .result-stat-label {
            font-size: 11px;
            color: #555;
            margin-top: 4px;
        }

        .btn-restart {
            padding: 12px 35px;
            font-size: 14px;
            background: transparent;
            color: #888;
            border: 1px solid #333;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-restart:hover {
            background: #1a1a22;
            border-color: #444;
        }

        .time-display {
            font-size: 11px;
            color: #444;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>夜间值班审查</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">混乱值</div>
                    <div class="stat-value chaos-value" id="chaosValue">0/5</div>
                    <div class="bar-container">
                        <div class="bar-fill chaos-fill" id="chaosFill" style="width: 0%"></div>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-label">道德压力</div>
                    <div class="stat-value moral-value" id="moralValue">0/5</div>
                    <div class="bar-container">
                        <div class="bar-fill moral-fill" id="moralFill" style="width: 0%"></div>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-label">已审查</div>
                    <div class="stat-value progress-value" id="progressValue">1/20</div>
                </div>
            </div>
        </div>

        <div class="game-area">
            <div class="person-info">
                <div class="person-name" id="personName">待审查者</div>
                <div class="person-desc" id="personDesc"></div>
            </div>

            <div class="chat-box" id="chatBox"></div>

            <div class="question-panel">
                <div class="question-header">
                    <span>选择提问（剩余 <span id="askCount">3</span> 次）</span>
                    <span style="color:#444">或直接做出判断</span>
                </div>
                <div class="questions" id="questions"></div>
            </div>
        </div>

        <div class="controls">
            <div class="prompt-text">此人是否放行？</div>
            <div class="buttons">
                <button class="btn btn-reject" onclick="judge(true)">扣留</button>
                <button class="btn btn-pass" onclick="judge(false)">放行</button>
            </div>
        </div>

        <div class="time-display" id="timeDisplay">02:47</div>
    </div>

    <div class="overlay" id="overlay">
        <div class="result-box" id="resultBox">
            <h2 id="resultTitle"></h2>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-stat-value" id="finalChaos">0</div>
                    <div class="result-stat-label">混乱值</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="finalMoral">0</div>
                    <div class="result-stat-label">道德压力</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="finalCount">0</div>
                    <div class="result-stat-label">审查人数</div>
                </div>
            </div>
            <p id="resultText"></p>
            <button class="btn-restart" onclick="restartGame()">重新值班</button>
        </div>
    </div>

                    '我完成了敲门动作。',

                ],
                gray: [

                    '忘了。',

                ],

            },
            {
                q: '刚从外面进来，眼镜会不会起雾？',
                human: [

                    '戴眼镜的都这样，习惯了。',

                ],

                    '有可能。',
                    '温度变化会影响视觉辅助设备。',
                    '室内外温差较大时会出现这种情况。'
                ],
                gray: [

                    '没注意。',
                    '也许吧。',

                    '还好。'

            },
            {

                human: [

                    '有时候忘了调，经常突然响。',
                    '声音，怕听不到。',

                ],
                alternate: [

                    '我使用正常的手机功能。',
                    '手机铃声模式不影响通讯功能。',

                ],

                    '不一定。',

            },
            {
                q: '我要是现在不让你进去，你准备怎么办？',
                human: [
                    '那我还能怎么办，走呗。',

                    '我会不爽，但总不能硬闯吧。',

                ],
                alternate: [

                gray: [

            {
                q: '你刚才上楼的时候，有没有听见自己后面还有脚步声？',
                human: [
                    '有，吓我一跳，后来发现是回音。',
                    '没有，就我一个。',

                gray: [

            {
                q: '行，不聊别的。你现在最想干嘛？',
                human: [
                    '进去，坐会儿，喝口热的。',
                    '赶紧把这事弄完，我累了。',

                    '就进去，别再问了。'
                ],
                alternate: [
                    '我想完成进入这里这件事。',
                    '继续当前流程。',
                    '做我该做的事。',
                    '我的目的是进入这个建筑物。',
                    '我需要完成我来到这里的任务。'
                ],
                gray: [
                    '没想好。',
                    '你先让我进去再说。',
                    '这问题真没劲。',
                    '不想回答。',
                    '没什么特别想干的。'
                ],
                obvious: '我的目标是成功进入这个地点，完成我被指派的任务。'
            }
        ];

        function generatePerson() {
            isAlternate = Math.random() < 0.38;

            const name = names[Math.floor(Math.random() * names.length)];
            const job = jobs[Math.floor(Math.random() * jobs.length)];
            const age = 25 + Math.floor(Math.random() * 40);
            const reason = reasons[Math.floor(Math.random() * reasons.length)];

            document.getElementById('personName').textContent = `${name}，${age}岁，${job}`;
            document.getElementById('personDesc').textContent = reason;

            askCount = 3;
            document.getElementById('chatBox').innerHTML = '';
            document.getElementById('askCount').textContent = askCount;

            const shuffled = [...questionBank].sort(() => Math.random() - 0.5);
            currentQuestions = shuffled.slice(0, 5);

            renderQuestions();

            updateTime();
        }

        function renderQuestions() {
            const container = document.getElementById('questions');
            container.innerHTML = '';

            currentQuestions.forEach((q, index) => {
                const btn = document.createElement('button');
                btn.className = 'question-btn';
                btn.textContent = q.q;
                btn.onclick = () => askQuestion(index);
                container.appendChild(btn);
            });
        }

        function askQuestion(index) {
            if (askCount <= 0) return;

            const questionData = currentQuestions[index];
            const chatBox = document.getElementById('chatBox');

            const questionMsg = document.createElement('div');
            questionMsg.className = 'message question';
            questionMsg.textContent = questionData.q;
            chatBox.appendChild(questionMsg);

            let answer;
            if (isAlternate) {
                const roll = Math.random();
                if (roll < 0.15) {
                    answer = questionData.obvious;
                } else if (roll < 0.60) {
                    answer = questionData.alternate[Math.floor(Math.random() * questionData.alternate.length)];
                } else {
                    answer = questionData.gray[Math.floor(Math.random() * questionData.gray.length)];
                }
            } else {
                const roll = Math.random();
                if (roll < 0.75) {
                    answer = questionData.human[Math.floor(Math.random() * questionData.human.length)];
                } else {
                    answer = questionData.gray[Math.floor(Math.random() * questionData.gray.length)];
                }
            }

            setTimeout(() => {
                const answerMsg = document.createElement('div');
                answerMsg.className = 'message answer';
                answerMsg.textContent = answer;
                chatBox.appendChild(answerMsg);
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 400);

            askCount--;
            document.getElementById('askCount').textContent = askCount;

            const buttons = document.querySelectorAll('.question-btn');
            buttons[index].disabled = true;

            if (askCount <= 0) {
                buttons.forEach(btn => btn.disabled = true);
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function judge(playerThinksIsAlternate) {
            const chatBox = document.getElementById('chatBox');

            if (playerThinksIsAlternate === isAlternate) {
                showSystemMessage('判断正确', 'correct');
                setTimeout(() => nextPerson(), 800);
            } else if (playerThinksIsAlternate && !isAlternate) {
                moral++;
                updateMoralDisplay();
                showSystemMessage('扣留了一个普通人，道德压力+1', 'wrong-moral');

                if (moral >= 5) {
                    setTimeout(() => gameOver(false, 'moral'), 1200);
                } else {
                    setTimeout(() => nextPerson(), 1200);
                }
            } else {
                chaos++;
                updateChaosDisplay();
                showSystemMessage('放走了一个伪人，混乱值+1', 'wrong-chaos');

                if (chaos >= 5) {
                    setTimeout(() => gameOver(false, 'chaos'), 1200);
                } else {
                    setTimeout(() => nextPerson(), 1200);
                }
            }
        }

        function showSystemMessage(msg, type) {
            const chatBox = document.getElementById('chatBox');
            const sysMsg = document.createElement('div');
            sysMsg.className = 'message system ' + type;
            sysMsg.textContent = '—— ' + msg + ' ——';
            chatBox.appendChild(sysMsg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function nextPerson() {
            currentPerson++;
            document.getElementById('progressValue').textContent = `${currentPerson}/20`;

            if (currentPerson > 20) {
                gameOver(true);
            } else {
                generatePerson();
            }
        }

        function updateChaosDisplay() {
            document.getElementById('chaosValue').textContent = `${chaos}/5`;
            document.getElementById('chaosFill').style.width = `${(chaos / 5) * 100}%`;
        }

        function updateMoralDisplay() {
            document.getElementById('moralValue').textContent = `${moral}/5`;
            document.getElementById('moralFill').style.width = `${(moral / 5) * 100}%`;
        }

        function updateTime() {
            const baseHour = 2;
            const baseMin = 47 + (currentPerson - 1) * 3;
            const hour = baseHour + Math.floor(baseMin / 60);
            const min = baseMin % 60;
            document.getElementById('timeDisplay').textContent =
                `${String(hour).padStart(2, '0')}:${String(min).padStart(2, '0')}`;
        }

        function gameOver(victory, reason = '') {
            const overlay = document.getElementById('overlay');
            const resultBox = document.getElementById('resultBox');
            const resultTitle = document.getElementById('resultTitle');
            const resultText = document.getElementById('resultText');

            overlay.classList.add('show');
            resultBox.className = 'result-box ' + (victory ? 'victory' : 'defeat');

            document.getElementById('finalChaos').textContent = chaos;
            document.getElementById('finalMoral').textContent = moral;
            document.getElementById('finalCount').textContent = Math.min(currentPerson - 1, 20);

            if (victory) {
                resultTitle.textContent = '值班结束';
                resultText.textContent = '天快亮了。这20个人都审查完了，没出什么大事。你可以下班了。';
            } else {
                resultTitle.textContent = '值班中断';
                if (reason === 'chaos') {
                    resultText.textContent = '混乱值过高，伪人已经渗透进来了。你不确定刚才放走的那几个是不是人。也许你身边已经不安全了。';
                } else {
                    resultText.textContent = '道德压力过高，你扣留了太多普通人。有人开始投诉，你的值班资格被暂停审查。';
                }
            }
        }

        function restartGame() {
            currentPerson = 1;
            chaos = 0;
            moral = 0;
            updateChaosDisplay();
            updateMoralDisplay();
            document.getElementById('progressValue').textContent = '1/20';
            document.getElementById('overlay').classList.remove('show');
            generatePerson();
        }

        generatePerson();
    </script>

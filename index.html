<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
        }
        canvas {
            display: block;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 设置画布尺寸
        canvas.width = 1000;
        canvas.height = 700;

        // 游戏数据
        const games = [
            {
                name: '深渊探雷',
                file: '深渊探雷.html',
                icon: '💣',
                color: '#e74c3c',
                gradient: ['#c0392b', '#e74c3c'],
                description: '经典扫雷游戏'
            },
            {
                name: '私密游戏',
                file: '私密游戏.html',
                icon: '🎮',
                color: '#9b59b6',
                gradient: ['#8e44ad', '#9b59b6'],
                description: '神秘冒险'
            },
            {
                name: '寻找伪人',
                file: '寻找伪人.html',
                icon: '👤',
                color: '#3498db',
                gradient: ['#2980b9', '#3498db'],
                description: '识破伪装'
            },
            {
                name: '战斗贪吃蛇',
                file: '战斗贪吃蛇.html',
                icon: '🐍',
                color: '#27ae60',
                gradient: ['#1e8449', '#27ae60'],
                description: '刺激对战'
            }
        ];

        // 卡片位置
        let cards = [];
        let hoveredCard = null;
        let animationFrame = 0;
        let particles = [];

        // 初始化卡片位置
        function initCards() {
            cards = [];
            const cardWidth = 200;
            const cardHeight = 280;
            const gap = 40;
            const startX = (canvas.width - (cardWidth * 4 + gap * 3)) / 2;
            const startY = 220;

            for (let i = 0; i < games.length; i++) {
                cards.push({
                    x: startX + i * (cardWidth + gap),
                    y: startY,
                    width: cardWidth,
                    height: cardHeight,
                    game: games[i],
                    hoverScale: 1,
                    targetScale: 1
                });
            }
        }

        // 粒子类
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.hue = Math.random() * 60 + 200;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, 60%, ${this.opacity})`;
                ctx.fill();
            }
        }

        // 初始化粒子
        function initParticles() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
        }

        // 绘制圆角矩形
        function roundRect(x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        // 绘制标题
        function drawTitle() {
            // 标题背景光晕
            const gradient = ctx.createRadialGradient(canvas.width / 2, 80, 0, canvas.width / 2, 80, 200);
            gradient.addColorStop(0, 'rgba(102, 126, 234, 0.3)');
            gradient.addColorStop(1, 'rgba(102, 126, 234, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(canvas.width / 2 - 200, 0, 400, 160);

            // 标题文字
            ctx.save();
            ctx.font = 'bold 52px "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // 文字阴影
            ctx.shadowColor = 'rgba(102, 126, 234, 0.8)';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            // 渐变文字
            const textGradient = ctx.createLinearGradient(canvas.width / 2 - 150, 80, canvas.width / 2 + 150, 80);
            textGradient.addColorStop(0, '#667eea');
            textGradient.addColorStop(0.5, '#a8edea');
            textGradient.addColorStop(1, '#667eea');
            ctx.fillStyle = textGradient;
            ctx.fillText('游戏大厅', canvas.width / 2, 80);

            ctx.restore();

            // 副标题
            ctx.font = '16px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fillText('选择你想玩的游戏', canvas.width / 2, 130);
        }

        // 绘制游戏卡片
        function drawCard(card, isHovered) {
            const scale = card.hoverScale;
            const centerX = card.x + card.width / 2;
            const centerY = card.y + card.height / 2;

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.scale(scale, scale);
            ctx.translate(-centerX, -centerY);

            // 卡片阴影
            ctx.shadowColor = isHovered ? card.game.color : 'rgba(0, 0, 0, 0.3)';
            ctx.shadowBlur = isHovered ? 30 : 15;
            ctx.shadowOffsetY = isHovered ? 10 : 5;

            // 卡片背景
            const cardGradient = ctx.createLinearGradient(card.x, card.y, card.x, card.y + card.height);
            cardGradient.addColorStop(0, 'rgba(255, 255, 255, 0.15)');
            cardGradient.addColorStop(1, 'rgba(255, 255, 255, 0.05)');

            roundRect(card.x, card.y, card.width, card.height, 20);
            ctx.fillStyle = cardGradient;
            ctx.fill();

            // 卡片边框
            ctx.strokeStyle = isHovered ? card.game.color : 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = isHovered ? 3 : 1;
            ctx.stroke();

            ctx.shadowColor = 'transparent';

            // 图标背景圆
            const iconSize = 80;
            const iconX = card.x + card.width / 2;
            const iconY = card.y + 70;

            const iconGradient = ctx.createRadialGradient(iconX, iconY, 0, iconX, iconY, iconSize);
            iconGradient.addColorStop(0, card.game.gradient[1]);
            iconGradient.addColorStop(1, card.game.gradient[0]);

            ctx.beginPath();
            ctx.arc(iconX, iconY, iconSize / 2, 0, Math.PI * 2);
            ctx.fillStyle = iconGradient;
            ctx.fill();

            // 图标
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(card.game.icon, iconX, iconY);

            // 游戏名称
            ctx.font = 'bold 22px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(card.game.name, card.x + card.width / 2, card.y + 150);

            // 游戏描述
            ctx.font = '14px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fillText(card.game.description, card.x + card.width / 2, card.y + 180);

            // 开始按钮
            const btnWidth = 120;
            const btnHeight = 36;
            const btnX = card.x + (card.width - btnWidth) / 2;
            const btnY = card.y + 220;

            const btnGradient = ctx.createLinearGradient(btnX, btnY, btnX + btnWidth, btnY + btnHeight);
            btnGradient.addColorStop(0, card.game.gradient[0]);
            btnGradient.addColorStop(1, card.game.gradient[1]);

            roundRect(btnX, btnY, btnWidth, btnHeight, 18);
            ctx.fillStyle = btnGradient;
            ctx.fill();

            ctx.font = 'bold 14px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('开始游戏', btnX + btnWidth / 2, btnY + btnHeight / 2);

            ctx.restore();
        }

        // 绘制底部信息
        function drawFooter() {
            ctx.font = '14px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.textAlign = 'center';
            ctx.fillText('点击卡片开始游戏', canvas.width / 2, canvas.height - 30);
        }

        // 主绘制函数
        function draw() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制粒子背景
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 绘制标题
            drawTitle();

            // 更新卡片缩放
            cards.forEach(card => {
                if (card === hoveredCard) {
                    card.targetScale = 1.08;
                } else {
                    card.targetScale = 1;
                }
                card.hoverScale += (card.targetScale - card.hoverScale) * 0.15;
            });

            // 绘制卡片
            cards.forEach(card => {
                drawCard(card, card === hoveredCard);
            });

            // 绘制底部
            drawFooter();

            animationFrame++;
            requestAnimationFrame(draw);
        }

        // 鼠标移动事件
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            hoveredCard = null;
            cards.forEach(card => {
                if (mouseX >= card.x && mouseX <= card.x + card.width &&
                    mouseY >= card.y && mouseY <= card.y + card.height) {
                    hoveredCard = card;
                }
            });

            canvas.style.cursor = hoveredCard ? 'pointer' : 'default';
        });

        // 鼠标点击事件
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            cards.forEach(card => {
                if (mouseX >= card.x && mouseX <= card.x + card.width &&
                    mouseY >= card.y && mouseY <= card.y + card.height) {
                    // 点击动画
                    card.hoverScale = 0.95;
                    setTimeout(() => {
                        window.location.href = card.game.file;
                    }, 150);
                }
            });
        });

        // 初始化并开始动画
        initCards();
        initParticles();
        draw();
    </script>
</body>
</html>

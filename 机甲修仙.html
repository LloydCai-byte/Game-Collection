<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>异端仙工</title>
  <style>
    :root{
      --bg:#0a0f14;
      --bg2:#0f151d;
      --panel:#151c25;
      --panel2:#1a2430;
      --panel3:#202c39;
      --line:rgba(205, 220, 240, 0.10);
      --line2:rgba(205, 220, 240, 0.18);
      --text:#e7edf5;
      --muted:#8b98a8;
      --gold:#c9a56a;
      --gold2:#e1c288;
      --cyan:#86a9b7;
      --green:#7eb092;
      --orange:#c99b69;
      --red:#c47a7a;
      --shadow:0 12px 30px rgba(0,0,0,.28);
      --radius:16px;
      --radius2:20px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.03), transparent 24%),
        linear-gradient(180deg,#0a0f14 0%, #0d131a 50%, #0a0f14 100%);
      color:var(--text);
      font-family:"Microsoft YaHei","PingFang SC","Segoe UI",system-ui,sans-serif;
    }
    body{
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      display:grid;
      grid-template-columns:1.8fr repeat(5,1fr);
      gap:12px;
      padding:14px 18px 12px;
      backdrop-filter:blur(10px);
      background:linear-gradient(180deg,rgba(10,15,20,.95),rgba(10,15,20,.78));
      border-bottom:1px solid var(--line);
    }

    .titlecard,.topcard{
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)), var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius2);
      padding:14px 16px;
      box-shadow:var(--shadow);
      min-height:80px;
    }

    .titlecard h1{
      margin:0 0 6px;
      font-size:28px;
      letter-spacing:1px;
      font-weight:800;
      color:#f0f4f8;
    }

    .subtitle{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .toplabel{
      color:var(--muted);
      font-size:12px;
      margin-bottom:8px;
    }

    .topvalue{
      font-size:22px;
      font-weight:700;
      color:#f1f4f8;
    }

    .layout{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:260px 1fr 340px;
      gap:14px;
      padding:14px 18px 12px;
    }

    .panel{
      min-height:0;
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)), var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius2);
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .panel-header{
      padding:13px 15px;
      border-bottom:1px solid var(--line);
      font-weight:700;
      letter-spacing:.3px;
      background:rgba(255,255,255,.015);
    }

    .panel-body{
      min-height:0;
      overflow:auto;
      padding:12px;
    }

    .resource-grid{
      display:grid;
      gap:10px;
    }

    .resource-item{
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 13px;
    }

    .resource-name{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .resource-value{
      font-size:24px;
      font-weight:800;
      color:#f0f4f8;
    }

    .center{
      display:flex;
      flex-direction:column;
      min-height:0;
      gap:12px;
    }

    .tabs{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      padding:12px 12px 0;
    }

    .tab-btn{
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--muted);
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      transition:.15s ease;
      font-size:13px;
    }
    .tab-btn:hover{
      border-color:var(--line2);
      color:#dfe6ee;
      transform:translateY(-1px);
    }
    .tab-btn.active{
      color:#fff;
      background:linear-gradient(180deg, rgba(201,165,106,.20), rgba(201,165,106,.08)), var(--panel3);
      border-color:rgba(201,165,106,.28);
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:12px;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0)), var(--panel2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:15px;
    }

    .card-title{
      font-size:17px;
      font-weight:700;
      margin-bottom:6px;
      color:#f0f4f8;
    }

    .card-sub{
      color:var(--muted);
      font-size:12px;
      line-height:1.65;
      margin-bottom:10px;
    }

    .hero{
      display:grid;
      grid-template-columns:1.25fr 1fr;
      gap:12px;
    }

    .hero-panel{
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.018), rgba(255,255,255,0)), var(--panel3);
      box-shadow:var(--shadow);
    }

    .hero-title{
      font-size:24px;
      font-weight:800;
      margin:0 0 8px;
      color:#f1f4f8;
    }

    .hero-desc{
      color:#d5dde7;
      line-height:1.75;
      font-size:14px;
    }

    .desc-box{
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.015);
      padding:14px;
      line-height:1.75;
      font-size:14px;
    }

    .stat-list{
      display:grid;
      gap:6px;
      margin:10px 0 12px;
    }

    .stat-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      line-height:1.55;
      font-size:13px;
    }

    .muted{color:var(--muted)}
    .highlight{color:var(--gold2);font-weight:700}

    .tag-row{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin:10px 0 12px;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      padding:4px 9px;
      border-radius:999px;
      font-size:12px;
      border:1px solid var(--line);
      color:#dbe3eb;
      background:rgba(255,255,255,.02);
    }

    .gold{color:#f2dfbb;border-color:rgba(201,165,106,.25);background:rgba(201,165,106,.08)}
    .success{color:#d7eadc;border-color:rgba(126,176,146,.25);background:rgba(126,176,146,.08)}
    .warn{color:#f1dfcf;border-color:rgba(201,155,105,.25);background:rgba(201,155,105,.08)}
    .danger{color:#efd8d8;border-color:rgba(196,122,122,.25);background:rgba(196,122,122,.08)}

    .progress-wrap{margin:12px 0}
    .progress-label{
      display:flex;
      justify-content:space-between;
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .progress-bar{
      height:10px;
      overflow:hidden;
      border-radius:999px;
      background:#0f151d;
      border:1px solid var(--line);
    }

    .progress-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, #8f7446, #c9a56a);
      transition:.2s;
    }

    .mini-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:10px;
      margin-top:12px;
    }

    .mini-box{
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.015);
      padding:12px;
    }

    .choice-list{
      display:grid;
      gap:10px;
      margin-top:10px;
    }

    .choice-item{
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.015);
      padding:12px;
    }

    .btn-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    button{
      border:1px solid var(--line2);
      border-radius:12px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      color:#edf2f7;
      padding:10px 12px;
      font-size:13px;
      cursor:pointer;
      transition:.15s ease;
    }

    button:hover:not(:disabled){
      transform:translateY(-1px);
      border-color:rgba(205,220,240,.28);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    }

    button:disabled{
      opacity:.4;
      cursor:not-allowed;
    }

    .btn-secondary{
      background:rgba(255,255,255,.02);
    }

    .btn-danger{
      border-color:rgba(196,122,122,.24);
      background:rgba(196,122,122,.08);
    }

    .btn-gold{
      border-color:rgba(201,165,106,.26);
      background:rgba(201,165,106,.10);
    }

    .detail-section{
      margin-bottom:14px;
      padding-bottom:14px;
      border-bottom:1px dashed rgba(205,220,240,.10);
    }
    .detail-section:last-child{
      border-bottom:none;
      padding-bottom:0;
      margin-bottom:0;
    }

    .detail-title{
      font-size:15px;
      font-weight:700;
      margin-bottom:8px;
      color:#f0f4f8;
    }

    .detail-text{
      font-size:13px;
      line-height:1.75;
      color:#d7dfe8;
    }

    .footer-log{
      min-height:180px;
      margin:0 18px 16px;
    }

    .log-list{
      display:grid;
      gap:8px;
      max-height:220px;
      overflow:auto;
    }

    .log-item{
      border:1px solid rgba(205,220,240,.08);
      border-radius:14px;
      background:rgba(255,255,255,.015);
      padding:10px 12px;
      line-height:1.55;
      font-size:13px;
      color:#e2e8ee;
    }

    .log-item small{
      display:block;
      color:var(--muted);
      margin-bottom:4px;
    }

    .pill{
      display:inline-block;
      padding:3px 8px;
      margin-left:6px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      font-size:11px;
      color:#dfe5ec;
    }

    .empty{
      color:var(--muted);
      font-size:13px;
      padding:12px 4px;
    }

    @media (max-width:1280px){
      .layout{grid-template-columns:240px 1fr}
      .right-panel{grid-column:1 / -1}
      .hero{grid-template-columns:1fr}
    }

    @media (max-width:920px){
      .topbar{grid-template-columns:1fr 1fr}
      .titlecard{grid-column:1 / -1}
      .layout{grid-template-columns:1fr}
    }
  </style>
</head>

    const PREP_OPTIONS = {

    let state = createInitialState();

    function createInitialState() {
      return {

    function uid(){ return Math.random().toString(36).slice(2,10); }
    function qs(sel){ return document.querySelector(sel); }
    function qsa(sel){ return Array.from(document.querySelectorAll(sel)); }
    function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
    function hasTech(id){ return state.techs.includes(id); }

    function getRankName() {
      if (state.alert <= 19) return "丙级异端工坊";
      if (state.alert <= 39) return "乙级机巧宗门";
      if (state.alert <= 59) return "甲级异端仙门";
      if (state.alert <= 79) return "天工重镇";
      return "禁忌飞升工程体";
    }

    function getAlertPenalty() {
      if (state.alert <= 19) return 0;
      if (state.alert <= 39) return -5;
      if (state.alert <= 59) return -10;
      if (state.alert <= 79) return -18;
      return -28;
    }

    function addLog(text) {
      state.logs.unshift({ time: `第 ${state.turn} 回合`, text });
      state.logs = state.logs.slice(0,20);
    }

    function getBuildingEffect(id) {
      const lv = state.buildings[id];
      const b = BUILDINGS[id];
      if (!b) return 0;
      if (id === "gongfang") return b.capEffects[lv];
      return (b.levelEffects || [])[lv] || 0;
    }

    function getMechFinalStats(templateId) {
      const tpl = MECH_TEMPLATES[templateId];
      const s = { ...tpl.stats };
      if (hasTech("structure_1")) s.hp += 10;
      if (hasTech("power_2")) s.atk += 5;
      if (templateId === "light" && hasTech("structure_2")) s.mobility += 6;
      if (templateId === "heavy" && hasTech("structure_3")) s.armor += 10;
      return s;
    }

    function getMechDisplayName(mech) {
      return mech.customName || MECH_TEMPLATES[mech.templateId].name;
    }

    function getDiscipleScore(d) {
      let score = d.shen*0.3 + d.ti*0.2 + d.yan*0.15 + d.dao*0.15 + d.sync*0.2;
      if (hasTech("mind_1")) score += 5;
      score += getBuildingEffect("tongbucang") * 0.3;
      if (d.status === "心神不稳") score -= 8;
      return score;
    }

    function getMechScore(mech) {
      const stats = getMechFinalStats(mech.templateId);
      let score = (stats.atk*0.25 + stats.armor*0.2 + stats.mobility*0.2 + stats.hp*0.15 + stats.load*0.1)/2;
      if (mech.state === "轻损") score -= 8;
      if (mech.state === "重损") score -= 20;
      return score;
    }

    function getTaskEnergyCost(taskId) {
      const base = typeof TASKS[taskId].energy === "function" ? TASKS[taskId].energy() : TASKS[taskId].energy;
      return hasTech("power_1") ? Math.max(1, Math.floor(base * 0.9)) : base;
    }

    function canAfford(cost){
      return Object.entries(cost).every(([k,v]) => (state.resources[k] || 0) >= v);
    }

    function pay(cost){
      Object.entries(cost).forEach(([k,v]) => state.resources[k] -= v);
    }

    function gain(reward){
      Object.entries(reward).forEach(([k,v]) => state.resources[k] = (state.resources[k] || 0) + v);
    }

    function formatCost(cost){
      return Object.entries(cost).map(([k,v]) => `${RESOURCE_LABELS[k]} ${v}`).join(" / ");
    }

    function getMechCap(){
      return BUILDINGS.gongfang.capEffects[state.buildings.gongfang];
    }

    function isTemplateUnlocked(id){
      if (id === "light") return true;
      if (id === "heavy") return state.chapter >= 2 || hasTech("structure_3");
      if (id === "ranged") return state.chapter >= 2;
      if (id === "resonance") return hasTech("structure_4");
      return false;
    }

    function randomName(){
      const a=["林","沈","顾","苏","谢","唐","宁","裴","孟","闻"];
      const b=["星","衡","宁","渊","川","遥","辞","玄","烬","朔"];
      const c=["明","舟","尘","岳","澜","昭","白","野","霁","河"];
      return a[randInt(0,a.length-1)] + b[randInt(0,b.length-1)] + c[randInt(0,c.length-1)];
    }

    function rollWeighted(entries){
      const total = entries.reduce((a,b)=>a+b[1],0);
      let roll = Math.random()*total;
      for (const [name,w] of entries){
        if (roll < w) return name;
        roll -= w;
      }
      return entries[0][0];
    }

    function generateDiscipleForChapter(chapter, forcedQuality = null){
      const pool = chapter === 1
        ? [["凡品",45],["良品",35],["上品",18],["异才",2]]
        : chapter === 2
        ? [["凡品",25],["良品",45],["上品",25],["异才",5]]
        : [["凡品",10],["良品",40],["上品",35],["异才",15]];

      const quality = forcedQuality || rollWeighted(pool);
      let range = [6,10];
      if (quality === "良品") range = [8,13];
      if (quality === "上品") range = [11,16];
      if (quality === "异才") range = [13,20];

      return {
        id: uid(),
        name: randomName(),
        quality,
        shen: randInt(range[0], range[1]),
        ti: randInt(range[0], range[1]),
        yan: randInt(range[0], range[1]),
        dao: randInt(range[0], range[1]),
        sync: randInt(range[0], range[1]),
        status: "可用",
        injuredTurns: 0
      };
    }

    function randomAvailableDisciple(){
      const list = state.disciples.filter(d => d.status === "可用" || d.status === "心神不稳");
      if (!list.length) return null;
      return list[randInt(0, list.length - 1)];
    }

    function damageRandomMech(){
      if (!state.mechs.length) return;
      const mech = state.mechs[randInt(0, state.mechs.length - 1)];
      if (mech.state === "完好") mech.state = "轻损";
      else mech.state = "重损";
    }

    function getCurrentChapterRequirements(){
      if (state.chapter === 1) return { label: "第一次渡劫", need: { shengWang: 25, jieleichang: 1, jieSha: 10, lingJing: 30 } };
      if (state.chapter === 2) return { label: "第二次渡劫", need: { shengWang: 60, jieleichang: 2, jieSha: 20, lingJing: 45 } };
      return { label: "最终飞升", need: { shengWang: 100, jieleichang: 3, jieSha: 35, lingJing: 70, shenShi: 15 } };
    }

    function canStartTribulation(){
      const req = getCurrentChapterRequirements().need;
      const usableDis = state.disciples.some(d => d.status === "可用" || d.status === "心神不稳");
      const completeMech = state.mechs.some(m => {
        if (m.state !== "完好") return false;
        if (state.chapter === 2) return m.templateId !== "light";
        if (state.chapter === 3) return ["heavy","ranged","resonance"].includes(m.templateId);
        return true;
      });
      return (
        state.resources.shengWang >= req.shengWang &&
        completeMech &&
        usableDis &&
        state.buildings.jieleichang >= req.jieleichang &&
        state.resources.jieSha >= req.jieSha &&
        state.resources.lingJing >= req.lingJing &&
        (!req.shenShi || state.resources.shenShi >= req.shenShi)
      );
    }

    function getTribulationCandidate(){
      const mechs = state.mechs.filter(m => m.state !== "重损").sort((a,b) => getMechScore(b) - getMechScore(a));
      const disciples = state.disciples.filter(d => d.status === "可用" || d.status === "心神不稳").sort((a,b) => getDiscipleScore(b) - getDiscipleScore(a));
      return { mech: mechs[0] || null, disciple: disciples[0] || null };
    }

    function getTribulationScoreBreakdown(){
      const { mech, disciple } = getTribulationCandidate();
      if (!mech || !disciple) return null;
      const stats = getMechFinalStats(mech.templateId);

      let mechPart = stats.hp*0.25 + stats.armor*0.35 + getBuildingEffect("jieleichang");
      let energyPart = stats.load*0.4;
      let mindPart = disciple.shen*0.35 + disciple.dao*0.25 + disciple.sync*0.2 + getBuildingEffect("tongbucang")*0.4;
      let prep = 0;

      if (state.tribulationPrep.armor) mechPart += 10;
      if (state.tribulationPrep.sync) mindPart += 10;
      if (state.tribulationPrep.energy) energyPart += 10;
      if (state.tribulationPrep.leak) prep += 8;
      if (state.tribulationPrep.anchor) prep += 12;

      if (mech.templateId === "heavy") mechPart += 15;
      if (mech.templateId === "resonance" && disciple.sync >= 14) prep += 12;
      if (mech.templateId === "resonance" && disciple.sync < 14) prep -= 10;
      if (hasTech("mind_4")) mindPart += 10;
      if (hasTech("power_4")) energyPart += 6;

      const total = mechPart + energyPart + mindPart + prep + getAlertPenalty() + randInt(-5,8);
      return { mech, disciple, mechPart, energyPart, mindPart, prep, total };
    }

    function nextChapterOrWin(){
      state.chapterFailedTribulations = 0;
      if (state.chapter < 3){
        state.chapter += 1;
        addLog(`你成功通过本阶段渡劫，宗门进入 ${CHAPTERS[state.chapter].name}。`);
      } else {
        state.victory = true;
        addLog("最终飞升工程完成。你没有等待天道许可，而是用机甲和工程学撬开了飞升之门。");
      }
    }

    function tryTribulation(){
      if (state.ap < 1) return setDetail("行动点不足。");
      if (!canStartTribulation()) return setDetail("当前条件尚不足以发起渡劫。");
      state.ap -= 1;

      const result = getTribulationScoreBreakdown();
      if (!result) return;
      const { mech, disciple, total } = result;

      let tier = "失败";
      if (total >= 100) tier = "大成功";
      else if (total >= 80) tier = "成功";
      else if (total >= 60) tier = "惨胜";

      let summary = `渡劫评分 ${Math.round(total)}，结果：${tier}。`;

      if (tier === "大成功"){
        state.resources.shengWang += 20;
        state.resources.lingJing += 30;
        state.resources.keYan += 25;
        if (hasTech("power_4")){
          state.resources.lingJing += 30;
          state.resources.keYan += 20;
          summary += " 劫雷蓄能原理生效。";
        }
        if (Math.random() < 0.15 && mech.state === "完好") mech.state = "轻损";
        state.alert += 8;
        nextChapterOrWin();
      } else if (tier === "成功"){
        state.resources.shengWang += 12;
        state.resources.lingJing += 15;
        state.resources.keYan += 10;
        if (Math.random() < 0.55 && mech.state === "完好") mech.state = "轻损";
        state.alert += 8;
        nextChapterOrWin();
      } else if (tier === "惨胜"){
        state.resources.shengWang += 8;
        mech.state = "重损";
        disciple.status = Math.random() < 0.65 ? "重伤" : "心神不稳";
        disciple.injuredTurns = disciple.status === "重伤" ? 2 : 0;
        state.alert += 8;
        nextChapterOrWin();
      } else {
        state.resources.shengWang = Math.max(0, state.resources.shengWang - 10);
        mech.state = "重损";
        if (Math.random() < 0.65){
          disciple.status = "重伤";
          disciple.injuredTurns = 2;
        } else {
          disciple.status = "心神不稳";
        }
        state.alert += 8;
        state.chapterFailedTribulations += 1;
        if (state.chapter === 3) state.finalFailedTimes += 1;
      }

      addLog(`【渡劫】${getMechDisplayName(mech)} 由 ${disciple.name} 驾驶完成冲关。${summary}`);
      state.tribulationPrep = { armor:false, sync:false, energy:false, leak:false, anchor:false };
      evaluateFailure();
      saveGame();
      renderAll();
    }

    function usePrep(key){
      if (state.ap < 1) return setDetail("行动点不足。");
      if (state.tribulationPrep[key]) return setDetail("该准备已经完成。");
      const conf = PREP_OPTIONS[key];
      if (!canAfford(conf.cost)) return setDetail("资源不足。");
      pay(conf.cost);
      state.ap -= 1;
      state.tribulationPrep[key] = true;
      addLog(`你完成了渡劫准备：${conf.name}。`);
      saveGame();
      renderAll();
    }

    function repairMech(uid){
      const mech = state.mechs.find(m => m.uid === uid);
      if (!mech) return;
      if (state.ap < 1) return setDetail("行动点不足。");
      if (mech.state === "完好") return setDetail("该机甲无需修复。");

      const tpl = MECH_TEMPLATES[mech.templateId];
      let ratio = mech.state === "轻损" ? 0.25 : 0.5;
      ratio *= (1 - BUILDINGS.gongfang.repairDiscount[state.buildings.gongfang]);
      const cost = {};
      Object.entries(tpl.cost).forEach(([k,v]) => cost[k] = Math.max(1, Math.ceil(v * ratio)));

      if (!canAfford(cost)) return setDetail("修复资源不足。");

      pay(cost);
      state.ap -= 1;
      mech.state = "完好";
      addLog(`机甲 ${getMechDisplayName(mech)} 修复完成。`);
      saveGame();
      renderAll();
    }

    function buildMech(templateId){
      if (state.ap < 1) return setDetail("行动点不足。");
      if (state.mechs.length >= getMechCap()) return setDetail("机甲工坊容量已满。");
      const tpl = MECH_TEMPLATES[templateId];
      if (!isTemplateUnlocked(templateId)) return setDetail("尚未解锁该机型。");
      if (!canAfford(tpl.cost)) return setDetail("资源不足。");

      pay(tpl.cost);
      state.ap -= 1;
      state.mechs.push({ uid: uid(), templateId, customName: tpl.name, state: "完好" });
      if (["heavy","ranged","resonance"].includes(templateId)) state.alert += 4;
      addLog(`机甲工坊完成了新机体：${tpl.name}。`);
      saveGame();
      renderAll();
    }

    function upgradeBuilding(id){
      if (state.ap < 1) return setDetail("行动点不足。");
      const lv = state.buildings[id];
      const data = BUILDINGS[id];
      if (lv >= data.maxLevel) return setDetail("该建筑已满级。");
      const cost = data.upgradeCosts[lv];
      if (!cost || !canAfford(cost)) return setDetail("资源不足或当前无法升级。");

      pay(cost);
      state.ap -= 1;
      state.buildings[id] += 1;
      addLog(`${data.name} 升至 ${state.buildings[id]} 级。`);
      saveGame();
      renderAll();
    }

    function researchTech(id){
      if (state.ap < 1) return setDetail("行动点不足。");
      const tech = TECHS[id];
      if (hasTech(id)) return setDetail("该科技已经完成。");
      if (!tech.prereq.every(hasTech)) return setDetail("前置科技未满足。");
      if (!canAfford(tech.cost)) return setDetail("科研资源不足。");

      pay(tech.cost);
      state.ap -= 1;
      state.techs.push(id);
      state.alert += tech.alert || 0;
      addLog(`研究完成：${tech.name}。`);
      saveGame();
      renderAll();
    }

    function refreshRecruitCandidates(){
      if (state.ap < 1) return setDetail("行动点不足。");
      state.ap -= 1;
      state.recruitCandidates = [
        generateDiscipleForChapter(state.chapter),
        generateDiscipleForChapter(state.chapter),
        generateDiscipleForChapter(state.chapter)
      ];
      addLog("你发布了招募令，新的弟子候选抵达山门。");
      saveGame();
      renderAll();
    }

    function recruitDisciple(id){
      const idx = state.recruitCandidates.findIndex(x => x.id === id);
      if (idx === -1) return;
      const d = state.recruitCandidates[idx];
      state.disciples.push(d);
      state.recruitCandidates.splice(idx, 1);
      addLog(`你录用了弟子 ${d.name}（${d.quality}）。`);
      saveGame();
      renderAll();
    }

    function publicTest(){
      if (state.ap < 1) return setDetail("行动点不足。");
      if (!state.mechs.some(m => m.state !== "重损")) return setDetail("至少需要一台可用机甲。");
      state.ap -= 1;
      const gainVal = randInt(4, 8);
      state.resources.shengWang += gainVal;
      state.alert += 2;
      addLog(`你举行了一次公开测试，宗门声望 +${gainVal}，天道警戒 +2。`);
      saveGame();
      renderAll();
    }

    function executeTask(taskId, mechId, discipleId){
      if (state.ap < 1) return setDetail("行动点不足。");
      if (!taskId || !mechId || !discipleId) return setDetail("请先选择任务、机甲与弟子。");

      const task = TASKS[taskId];
      const mech = state.mechs.find(m => m.uid === mechId);
      const d = state.disciples.find(x => x.id === discipleId);

      if (!mech || !d) return setDetail("出战配置无效。");
      if (mech.state === "重损") return setDetail("该机甲重损，无法出战。");
      if (!(d.status === "可用" || d.status === "心神不稳")) return setDetail("该弟子当前无法出战。");

      const energy = getTaskEnergyCost(taskId);
      if (state.resources.lingJing < energy) return setDetail("灵晶不足。");

      state.ap -= 1;
      state.resources.lingJing -= energy;

      const difficulty = typeof task.diff === "function" ? task.diff() : task.diff;
      let score = 50 + getMechScore(mech) + (getDiscipleScore(d) - 10) - difficulty + randInt(-8,8);

      const tpl = MECH_TEMPLATES[mech.templateId];
      if (tpl.adapt[taskId]) score += tpl.adapt[taskId];
      if (task.best.includes(mech.templateId)) score += 4;
      if (mech.templateId === "ranged" && taskId === "hunt") score += 4;
      if (mech.templateId === "ranged" && taskId === "commission") score += 4;
      if (mech.templateId === "resonance" && d.sync >= 14) score += 15;
      if (mech.templateId === "resonance" && d.sync < 14) score -= 10;
      if (mech.state === "轻损") score -= 6;
      if (d.status === "心神不稳") score -= 10;

      let result = "失败";
      if (score >= 95) result = "大成功";
      else if (score >= 70) result = "成功";
      else if (score >= 50) result = "惨胜";

      let rewardText = "";

      if (result === "大成功" || result === "成功"){
        const rewards = task.rewards();
        if (mech.templateId === "ranged" && taskId === "hunt" && rewards.fuJin) rewards.fuJin += Math.ceil(rewards.fuJin * 0.15);
        if (taskId === "gather" && result === "大成功") rewards.shengWang = (rewards.shengWang || 0) + 2;
        gain(rewards);
        rewardText = Object.entries(rewards).map(([k,v]) => `${RESOURCE_LABELS[k]} +${v}`).join("、");
        if (result === "大成功") state.resources.shengWang += 2;
      }

      if (result === "惨胜"){
        const rewards = task.rewards();
        Object.keys(rewards).forEach(k => rewards[k] = Math.max(1, Math.floor(rewards[k] * 0.7)));
        gain(rewards);
        rewardText = Object.entries(rewards).map(([k,v]) => `${RESOURCE_LABELS[k]} +${v}`).join("、");
        if (mech.state === "完好") mech.state = "轻损";
        else mech.state = "重损";

        if (taskId === "ruin"){
          d.status = "心神不稳";
        } else if (Math.random() < 0.35){
          d.status = "轻伤";
          d.injuredTurns = 1;
        }
      }

      if (result === "失败"){
        if (taskId === "commission") state.resources.shengWang = Math.max(0, state.resources.shengWang - 5);

        if (taskId === "gather"){
          if (Math.random() < 0.45) mech.state = mech.state === "完好" ? "轻损" : mech.state;
        } else if (taskId === "hunt"){
          mech.state = "轻损";
          if (Math.random() < 0.35){
            d.status = "轻伤";
            d.injuredTurns = 1;
          }
        } else if (taskId === "ruin"){
          if (Math.random() < 0.48) mech.state = "轻损";
          if (Math.random() < 0.45) d.status = "心神不稳";
        } else if (taskId === "recover"){
          mech.state = Math.random() < 0.62 ? "重损" : "轻损";
          if (Math.random() < 0.42){
            d.status = "重伤";
            d.injuredTurns = 2;
          }
        } else if (taskId === "commission"){
          if (Math.random() < 0.35) mech.state = "轻损";
        }
      }

      addLog(`【出战】${task.name}：${getMechDisplayName(mech)} / ${d.name}，评分 ${Math.round(score)}，结果：${result}${rewardText ? `，获得 ${rewardText}` : ""}。`);
      maybeTriggerEvent();
      evaluateFailure();
      saveGame();
      renderAll();
    }

    function maybeTriggerEvent(){
      if (currentEvent) return;
      const chance = 0.22 + Math.min(0.16, state.alert / 320);
      if (Math.random() < chance) currentEvent = EVENTS[randInt(0, EVENTS.length - 1)];
    }

    function resolveEventOption(idx){
      if (!currentEvent) return;
      currentEvent.options[idx].run();
      currentEvent = null;
      evaluateFailure();
      saveGame();
      renderAll();
    }

    function progressStatusesAtTurnEnd(){
      state.disciples.forEach(d => {
        if (d.injuredTurns > 0){
          d.injuredTurns--;
          if (d.injuredTurns <= 0){
            d.status = "可用";
            d.injuredTurns = 0;
          }
        }
      });
    }

    function endTurn(){
      state.ap = 3;
      state.turn += 1;

      const mineYield = getBuildingEffect("mine");
      state.resources.xuanTie += mineYield;
      state.resources.lingJing += getBuildingEffect("lingnengjing");
      state.resources.fuJin += getBuildingEffect("rongzulu");
      state.resources.keYan += getBuildingEffect("yansuange");
      state.resources.jieSha += getBuildingEffect("jieleichang");
      if (hasTech("mind_3")) state.resources.keYan += 5;

      progressStatusesAtTurnEnd();
      if (Math.random() < 0.18) maybeTriggerEvent();

      addLog(`回合结束，矿场采收玄铁 +${mineYield}，灵晶 +${getBuildingEffect("lingnengjing")}，符金 +${getBuildingEffect("rongzulu")}，科研点 +${getBuildingEffect("yansuange")}${state.buildings.jieleichang > 0 ? `，劫砂 +${getBuildingEffect("jieleichang")}` : ""}。`);
      evaluateFailure();
      saveGame();
      renderAll();
    }

    function evaluateFailure(){
      if (state.victory) return;
      if (state.resources.shengWang <= 0 && state.chapterFailedTribulations >= 2){
        state.gameOver = true;
        addLog("宗门声望坠至谷底，外部压力彻底压垮了这条异端路线。");
      }
      if (state.finalFailedTimes >= 3){
        state.gameOver = true;
        addLog("最终飞升实验连续三次失败，路线被判定为彻底破产。");
      }
    }

    function saveGame(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadGame(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return setDetail("没有找到存档。");
      try {
        state = JSON.parse(raw);
        currentEvent = null;
        detailText = "";
        renderAll();
      } catch {
        setDetail("存档读取失败。");
      }
    }

      selectedMechId = null;

      detailText = "";
      saveGame();
      renderAll();

        <div class="choice-item">
          <div class="stat-row">
            <strong>${getMechDisplayName(m)}</strong>
            <span class="pill">${m.state}</span>
          </div>
          <div class="muted">${MECH_TEMPLATES[m.templateId].name}</div>
          <div class="btn-row">
            <button data-select-mech="${m.uid}" ${m.state === "重损" ? "disabled" : ""}>${selectedMechId === m.uid ? "已选择" : "选择机甲"}</button>
          </div>
        </div>
      `).join("");

      const discipleCards = state.disciples.map(d => `
        <div class="choice-item">
          <div class="stat-row">
            <strong>${d.name}</strong>
            <span class="pill">${d.status}</span>
          </div>
          <div class="muted">${d.quality}｜综合评分 ${Math.round(getDiscipleScore(d))}</div>
          <div class="btn-row">
            <button data-select-disciple="${d.id}" ${!(d.status === "可用" || d.status === "心神不稳") ? "disabled" : ""}>${selectedDiscipleId === d.id ? "已选择" : "选择弟子"}</button>
          </div>
        </div>
      `).join("");

      const selectedTaskName = selectedTask ? TASKS[selectedTask].name : "未选择";
      const selectedMechName = selectedMechId ? getMechDisplayName(state.mechs.find(m => m.uid === selectedMechId) || { templateId: "light", customName: "未选择" }) : "未选择";
      const selectedDiscipleName = selectedDiscipleId ? (state.disciples.find(d => d.id === selectedDiscipleId)?.name || "未选择") : "未选择";

      return `
        <div class="cards" style="margin-bottom:12px;">${taskCards}</div>
        <div class="hero">
          <div class="hero-panel">
            <div class="card-title">出战配置</div>
            <div class="desc-box">
              <div><span class="highlight">任务：</span>${selectedTaskName}</div>
              <div><span class="highlight">机甲：</span>${selectedMechName}</div>
              <div><span class="highlight">弟子：</span>${selectedDiscipleName}</div>
            </div>
            <div class="btn-row">
              <button id="btn-start-task">开始任务</button>
            </div>
          </div>

          <div class="hero-panel">
            <div class="card-title">当前可选机甲</div>
            <div class="choice-list">${mechCards || `<div class="empty">暂无机甲。</div>`}</div>
          </div>
        </div>

        <div class="hero-panel" style="margin-top:12px;">
          <div class="card-title">当前可选弟子</div>
          <div class="choice-list">${discipleCards || `<div class="empty">暂无弟子。</div>`}</div>
        </div>
      `;
    }

    function renderTribulation(){
      const req = getCurrentChapterRequirements();
      const breakdown = getTribulationScoreBreakdown();

      const prepCards = Object.entries(PREP_OPTIONS).map(([key,val]) => `
        <div class="card">
          <div class="card-title">${val.name}</div>
          <div class="card-sub">${val.effect}</div>
          <div class="stat-list">
            <div class="stat-row"><span class="muted">消耗</span><span>${formatCost(val.cost)}</span></div>
            <div class="stat-row"><span class="muted">状态</span><span>${state.tribulationPrep[key] ? "已完成" : "未准备"}</span></div>
          </div>
          <div class="btn-row">
            <button data-prep="${key}" ${state.tribulationPrep[key] ? "disabled" : ""}>执行准备</button>
          </div>
        </div>
      `).join("");

      return `
        <div class="hero" style="margin-bottom:12px;">
          <div class="hero-panel">
            <div class="card-title">${req.label}</div>
            <div class="desc-box">
              <div><span class="highlight">宗门声望：</span>${state.resources.shengWang} / ${req.need.shengWang}</div>
              <div><span class="highlight">灵晶：</span>${state.resources.lingJing} / ${req.need.lingJing}</div>
              <div><span class="highlight">劫砂：</span>${state.resources.jieSha} / ${req.need.jieSha}</div>
              ${req.need.shenShi ? `<div><span class="highlight">神识样本：</span>${state.resources.shenShi} / ${req.need.shenShi}</div>` : ""}
              <div><span class="highlight">劫雷实验场：</span>${state.buildings.jieleichang} / ${req.need.jieleichang}</div>
            </div>
            <div class="btn-row" style="margin-top:12px;">
              <button class="btn-gold" id="btn-start-tribulation" ${!canStartTribulation() ? "disabled" : ""}>发起渡劫</button>
            </div>
          </div>

          <div class="hero-panel">
            <div class="card-title">自动候选分析</div>
            ${
              breakdown ? `
              <div class="stat-list">
                <div class="stat-row"><span class="muted">机体</span><span>${getMechDisplayName(breakdown.mech)}</span></div>
                <div class="stat-row"><span class="muted">驾驶员</span><span>${breakdown.disciple.name}</span></div>
                <div class="stat-row"><span class="muted">机体维度</span><span>${Math.round(breakdown.mechPart)}</span></div>
                <div class="stat-row"><span class="muted">灵能维度</span><span>${Math.round(breakdown.energyPart)}</span></div>
                <div class="stat-row"><span class="muted">神识维度</span><span>${Math.round(breakdown.mindPart)}</span></div>
                <div class="stat-row"><span class="muted">准备修正</span><span>${Math.round(breakdown.prep)}</span></div>
                <div class="stat-row"><span class="muted">天道修正</span><span>${getAlertPenalty()}</span></div>
                <div class="stat-row"><span class="muted">预估总分</span><span>${Math.round(breakdown.total)}</span></div>
              </div>`
              : `<div class="empty">当前没有可自动分析的渡劫候选。</div>`
            }
          </div>
        </div>
        <div class="cards">${prepCards}</div>
      `;
    }

    function renderContent(){
      const root = qs("#content-root");
      if (currentTab === "overview") root.innerHTML = renderOverview();
      if (currentTab === "buildings") root.innerHTML = renderBuildings();
      if (currentTab === "research") root.innerHTML = renderResearch();
      if (currentTab === "mechs") root.innerHTML = renderMechs();
      if (currentTab === "disciples") root.innerHTML = renderDisciples();
      if (currentTab === "battle") root.innerHTML = renderBattle();
      if (currentTab === "tribulation") root.innerHTML = renderTribulation();
      bindContentEvents();
    }

    function bindContentEvents(){
      qsa("[data-upgrade-building]").forEach(btn => btn.onclick = () => upgradeBuilding(btn.dataset.upgradeBuilding));
      qsa("[data-research]").forEach(btn => btn.onclick = () => researchTech(btn.dataset.research));
      qsa("[data-build-mech]").forEach(btn => btn.onclick = () => buildMech(btn.dataset.buildMech));
      qsa("[data-repair-mech]").forEach(btn => btn.onclick = () => repairMech(btn.dataset.repairMech));
      qsa("[data-recruit]").forEach(btn => btn.onclick = () => recruitDisciple(btn.dataset.recruit));
      qsa("[data-select-task]").forEach(btn => btn.onclick = () => { selectedTask = btn.dataset.selectTask; renderContent(); });
      qsa("[data-select-mech]").forEach(btn => btn.onclick = () => { selectedMechId = btn.dataset.selectMech; renderContent(); });
      qsa("[data-select-disciple]").forEach(btn => btn.onclick = () => { selectedDiscipleId = btn.dataset.selectDisciple; renderContent(); });
      qsa("[data-prep]").forEach(btn => btn.onclick = () => usePrep(btn.dataset.prep));

      const btnStartTask = qs("#btn-start-task");
      if (btnStartTask) btnStartTask.onclick = () => executeTask(selectedTask, selectedMechId, selectedDiscipleId);

      const btnRefreshRecruit = qs("#btn-refresh-recruit");
      if (btnRefreshRecruit) btnRefreshRecruit.onclick = refreshRecruitCandidates;

      const btnStartTrib = qs("#btn-start-tribulation");
      if (btnStartTrib) btnStartTrib.onclick = tryTribulation;

      const btnEndTurn = qs("#btn-end-turn");
      if (btnEndTurn) btnEndTurn.onclick = endTurn;

      const btnPublicTest = qs("#btn-public-test");
      if (btnPublicTest) btnPublicTest.onclick = publicTest;

      const btnSave = qs("#btn-save");
      if (btnSave) btnSave.onclick = () => { saveGame(); setDetail("存档已保存。"); };

      const btnLoad = qs("#btn-load");
      if (btnLoad) btnLoad.onclick = loadGame;

      const btnNew = qs("#btn-new");
      if (btnNew) btnNew.onclick = newGame;

      const btnClear = qs("#btn-clear");
      if (btnClear) btnClear.onclick = clearSave;
    }

    function renderDetailPanel(){
      const root = qs("#detail-panel");

      if (currentEvent){
        root.innerHTML = `
          <div class="detail-section">
            <div class="detail-title">${currentEvent.title}</div>
            <div class="detail-text">${currentEvent.text}</div>
          </div>
          <div class="detail-section">
            <div class="detail-title">可选处理</div>
            <div class="choice-list">
              ${currentEvent.options.map((opt,idx) => `
                <div class="choice-item">
                  <div class="detail-text">${opt.text}</div>
                  <div class="btn-row"><button data-event-opt="${idx}">执行</button></div>
                </div>
              `).join("")}
            </div>
          </div>
        `;
        qsa("[data-event-opt]").forEach(btn => btn.onclick = () => resolveEventOption(Number(btn.dataset.eventOpt)));
        return;
      }

      if (detailText){
        root.innerHTML = `
          <div class="detail-section">
            <div class="detail-title">提示</div>
            <div class="detail-text">${detailText}</div>
          </div>
        `;
        return;
      }

      const req = getCurrentChapterRequirements();
      root.innerHTML = `
        <div class="detail-section">
          <div class="detail-title">宗门概览</div>
          <div class="detail-text">
            ${CHAPTERS[state.chapter].description}<br><br>
            当前天道警戒：${state.alert}<br>
            当前渡劫条件：${canStartTribulation() ? "已满足，可发起" : "未满足"}<br>
            当前阶段目标：${req.label}<br>
            玄铁矿场采收：+${getBuildingEffect("mine")} / 回合
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-title">当前风险</div>
          <div class="detail-text">
            章节失败渡劫次数：${state.chapterFailedTribulations}<br>
            最终飞升失败次数：${state.finalFailedTimes}<br>
            机甲数量：${state.mechs.length} / ${getMechCap()}
          </div>
        </div>
      `;
    }

    function renderLogs(){
      qs("#log-list").innerHTML = state.logs.map(log => `
        <div class="log-item">
          <small>${log.time}</small>
          ${log.text}
        </div>
      `).join("");
    }

    function init(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw){
        try { state = JSON.parse(raw); }
        catch(e){}
      } else {
        saveGame();
      }
      renderAll();
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roguelike 贪吃蛇</title>
    <style>
        /* ==================== 基础重置与全局样式 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ==================== 游戏容器 ==================== */
        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ==================== Canvas 样式 ==================== */
        #game-canvas {
            border: 2px solid #2a2a3a;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.1),
                        inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        /* ==================== HUD 样式 ==================== */
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .hud-left, .hud-right {
            display: flex;
            gap: 20px;
        }

        .hud-item {
            background: rgba(10, 10, 20, 0.8);
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid #2a2a3a;
            font-size: 14px;
        }

        .hud-label {
            color: #888;
            margin-right: 6px;
        }

        .hud-value {
            color: #00ffc8;
            font-weight: bold;
        }

        .hud-value.hp {
            color: #ff6b6b;
        }

        .hud-value.gold {
            color: #ffd700;
        }

        .hud-value.xp {
            color: #a78bfa;
        }

        /* ==================== 屏幕遮罩层 ==================== */
        .screen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .hidden {
            display: none !important;
        }

        /* ==================== 标题界面 ==================== */
        #title-screen {
            text-align: center;
        }

        #title-screen h1 {
            font-size: 48px;
            color: #00ffc8;
            text-shadow: 0 0 20px rgba(0, 255, 200, 0.5);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        #title-screen .subtitle {
            font-size: 16px;
            color: #888;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        #title-screen .features {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            justify-content: center;
        }

        #title-screen .feature {
            padding: 10px 20px;
            background: rgba(0, 255, 200, 0.1);
            border: 1px solid rgba(0, 255, 200, 0.3);
            border-radius: 20px;
            font-size: 14px;
            color: #00ffc8;
        }

        .btn {
            padding: 15px 50px;
            font-size: 18px;
            background: linear-gradient(135deg, #00ffc8 0%, #00a080 100%);
            border: none;
            border-radius: 30px;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.5);
        }

        .controls-info {
            margin-top: 40px;
            color: #666;
            font-size: 12px;
            line-height: 2;
        }

        .controls-info kbd {
            background: #2a2a3a;
            padding: 2px 8px;
            border-radius: 3px;
            color: #aaa;
            margin: 0 2px;
        }

        /* ==================== 暂停界面 ==================== */
        #pause-screen h2 {
            font-size: 36px;
            color: #00ffc8;
            margin-bottom: 30px;
        }

        #pause-screen p {
            color: #888;
            font-size: 14px;
        }

        /* ==================== Game Over 界面 ==================== */
        #gameover-screen {
            text-align: center;
        }

        #gameover-screen h2 {
            font-size: 42px;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            max-width: 300px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2a2a3a;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            color: #00ffc8;
            font-weight: bold;
        }

        /* ==================== 升级选择面板 ==================== */
        #upgrade-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #upgrade-panel h2 {
            font-size: 28px;
            color: #a78bfa;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(167, 139, 250, 0.5);
        }

        #upgrade-panel .hint {
            color: #666;
            margin-bottom: 30px;
        }

        .upgrade-cards {
            display: flex;
            gap: 20px;
        }

        .upgrade-card {
            width: 200px;
            padding: 25px 20px;
            background: linear-gradient(145deg, #1a1a2e 0%, #0f0f1a 100%);
            border: 2px solid #2a2a3a;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            animation: cardFadeIn 0.3s ease-out;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .upgrade-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: #00ffc8;
        }

        .upgrade-card .icon {
            font-size: 42px;
            margin-bottom: 12px;
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .upgrade-card .title {
            font-size: 16px;
            color: #00ffc8;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .upgrade-card .rarity {
            font-size: 10px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .upgrade-card .desc {
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
        }

        /* ==================== 消息提示 ==================== */
        #message-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 150;
            pointer-events: none;
        }

        .floating-message {
            font-size: 24px;
            color: #00ffc8;
            text-shadow: 0 0 20px rgba(0, 255, 200, 0.8);
            animation: floatUp 1.5s ease-out forwards;
            text-align: center;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px);
            }
        }

        /* ==================== 受伤闪烁效果 ==================== */
        #damage-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.3);
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.1s ease;
        }

        #damage-flash.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 游戏容器 -->
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <!-- HUD 将在后续添加 -->
    </div>

    <!-- 受伤闪烁层 -->
    <div id="damage-flash"></div>

    <!-- 消息容器 -->
    <div id="message-container"></div>

    <!-- 标题界面 -->
    <div id="title-screen" class="screen-overlay">
        <h1>ROGUE SNAKE</h1>
        <p class="subtitle">- 贪吃蛇 × Roguelike -</p>
        <div class="features">
            <span class="feature">吃</span>
            <span class="feature">成长</span>
            <span class="feature">构筑</span>
            <span class="feature">活下去</span>
        </div>
        <button class="btn" id="start-btn">开始游戏</button>
        <div class="controls-info">
            <p><kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 移动</p>
            <p><kbd>空格</kbd> 暂停 | <kbd>R</kbd> 快速重开</p>
        </div>
    </div>

    <!-- 暂停界面 -->
    <div id="pause-screen" class="screen-overlay hidden">
        <h2>游戏暂停</h2>
        <p>按 <kbd>空格</kbd> 继续游戏</p>
    </div>

    <!-- Game Over 界面 -->
    <div id="gameover-screen" class="screen-overlay hidden">
        <h2>GAME OVER</h2>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">分数</div>
                <div class="stat-value" id="final-score">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">存活时间</div>
                <div class="stat-value" id="final-time">0s</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">蛇身长度</div>
                <div class="stat-value" id="final-length">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">到达阶段</div>
                <div class="stat-value" id="final-stage">1</div>
            </div>
        </div>
        <button class="btn" id="restart-btn">再来一局</button>
    </div>

    <!-- 升级选择面板 -->
    <div id="upgrade-panel" class="hidden">
        <h2>选择升级</h2>
        <p class="hint">点击选择一项能力提升</p>
        <div class="upgrade-cards" id="upgrade-cards">
            <!-- 升级卡片将动态生成 -->
        </div>
    </div>

                    name: '金币果实',

                    repeatable: true,
                    maxStacks: 3,

                swift_move: {

        // ==================== 游戏状态 ====================

        // ==================== 初始化 ====================
        function init() {
            // 获取 Canvas
            game.canvas = document.getElementById('game-canvas');
            game.ctx = game.canvas.getContext('2d');

            // 设置 Canvas 尺寸
            game.canvas.width = CONFIG.GRID_WIDTH * CONFIG.CELL_SIZE;
            game.canvas.height = CONFIG.GRID_HEIGHT * CONFIG.CELL_SIZE;

            // 绑定事件
            bindEvents();

            // 显示标题界面
            showScreen('title');

            // 启动游戏循环
            game.isRunning = true;
            requestAnimationFrame(gameLoop);
        }

        // ==================== 事件绑定 ====================
        function bindEvents() {
            // 键盘事件
            document.addEventListener('keydown', handleKeyDown);

            // 按钮事件
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', restartGame);
        }

        // ==================== 键盘处理 ====================
        function handleKeyDown(e) {
            // 防止方向键滚动页面
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }

            switch (e.code) {
                case 'ArrowUp':
                case 'KeyW':
                    if (game.state === GameState.PLAYING) {
                        setDirection(0, -1);
                    }
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    if (game.state === GameState.PLAYING) {
                        setDirection(0, 1);
                    }
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    if (game.state === GameState.PLAYING) {
                        setDirection(-1, 0);
                    }
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    if (game.state === GameState.PLAYING) {
                        setDirection(1, 0);
                    }
                    break;
                case 'Space':
                    togglePause();
                    break;
                case 'KeyR':
                    if (game.state !== GameState.TITLE) {
                        restartGame();
                    }
                    break;
                case 'Enter':
                    if (game.state === GameState.GAMEOVER) {
                        restartGame();
                    }
                    break;
            }
        }

        // 设置移动方向（禁止180度反向）
        function setDirection(x, y) {
            // 不允许反向
            if (game.direction.x === -x && game.direction.y === -y) {
                return;
            }
            game.nextDirection = { x, y };
        }

        // ==================== 游戏流程控制 ====================
        function startGame() {
            resetGame();
            game.state = GameState.PLAYING;
            showScreen('playing');
        }

        function restartGame() {
            resetGame();
            game.state = GameState.PLAYING;
            showScreen('playing');
        }

        function togglePause() {
            if (game.state === GameState.PLAYING) {
                game.state = GameState.PAUSED;
                showScreen('paused');
            } else if (game.state === GameState.PAUSED) {
                game.state = GameState.PLAYING;
                showScreen('playing');
            }
        }

        function gameOver() {
            game.state = GameState.GAMEOVER;
            updateGameOverStats();
            showScreen('gameover');
        }

        function resetGame() {
